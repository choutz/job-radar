name: Scrape and Enrich Jobs

on:
  schedule:
    - cron: '0 13 * * *'   # 7am CST — scrape
    - cron: '0 1 * * *'    # 7pm CST — scrape
    - cron: '0 3 * * *'    # 9pm CST — nightly digest
  workflow_dispatch:
    inputs:
      job:
        description: 'Which job to run (all, scrape, email)'
        required: false
        default: 'all'

jobs:
  scrape:
    # Run if:
    # 1. It's a schedule event AND NOT the 3am digest time
    # 2. OR it's a manual trigger AND (job is 'all' OR 'scrape')
    if: |
      (github.event_name == 'schedule' && github.event.schedule != '0 3 * * *') ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'all' || github.event.inputs.job == 'scrape'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: pip install -r requirements.txt
      - name: Scrape and enrich
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python main.py

  email:
    # Run if:
    # 1. It's a schedule event AND it IS the 3am digest time
    # 2. OR it's a manual trigger AND (job is 'all' OR 'email')
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 3 * * *') ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'all' || github.event.inputs.job == 'email'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: pip install -r requirements.txt
      - name: Send digest
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
        run: python emailer.py